<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Cart</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page-shell">
        <section class="auth-screen" id="loginScreen">
            <div class="auth-panel">
                <div class="logo">
                    <div class="logo-icon">
                        <span class="ui-icon icon-cart" aria-hidden="true"></span>
                    </div>

                    <div>
                        <h1>Smart Cart</h1>
                        <span>Mercado Inteligente</span>
                    </div>
                </div>

                <div class="auth-copy">
                    <h2 id="authTitle">Entrar na conta</h2>
                    <p>Use sua conta para acessar o carrinho inteligente.</p>
                </div>

                <div class="auth-tabs" role="tablist" aria-label="Autenticacao">
                    <button class="auth-tab active" id="showLogin" type="button">Login</button>
                    <button class="auth-tab" id="showRegister" type="button">Cadastro</button>
                </div>

                <form class="auth-form" id="loginForm">
                    <label for="loginUsername">Usuario</label>
                    <input type="text" id="loginUsername" name="username" autocomplete="username" placeholder="seu usuario">

                    <label for="loginPassword">Senha</label>
                    <input type="password" id="loginPassword" name="password" autocomplete="current-password" placeholder="sua senha">

                    <button class="primary-btn" type="submit">
                        <span class="ui-icon icon-login" aria-hidden="true"></span>
                        Entrar
                    </button>
                </form>

                <form class="auth-form hidden" id="registerForm">
                    <label for="registerUsername">Novo usuario</label>
                    <input type="text" id="registerUsername" name="username" autocomplete="username" placeholder="minimo 3 caracteres">

                    <label for="registerPassword">Nova senha</label>
                    <input type="password" id="registerPassword" name="password" autocomplete="new-password" placeholder="minimo 6 caracteres">

                    <button class="primary-btn" type="submit">
                        <span class="ui-icon icon-user-plus" aria-hidden="true"></span>
                        Criar conta
                    </button>
                </form>

                <div class="auth-message" id="authMessage" role="status" aria-live="polite"></div>
            </div>
        </section>

        <main class="app hidden" id="app">
            <header class="app-header">
                <div>
                    <h1>Carrinho Inteligente</h1>
                    <p id="welcomeText">Bem-vindo</p>
                </div>

                <div class="header-actions">
                    <div class="user-chip" id="userChip">
                        <span class="ui-icon icon-user" aria-hidden="true"></span>
                        <span id="loggedUser">Usuario</span>
                    </div>

                    <button class="scan-btn" id="scanButton" type="button">
                        <span class="ui-icon icon-barcode" aria-hidden="true"></span>
                        Escanear Produto
                    </button>

                    <button class="logout-btn" id="logoutBtn" type="button">
                        <span class="ui-icon icon-logout" aria-hidden="true"></span>
                        Sair
                    </button>
                </div>
            </header>

            <section class="content-grid">
                <div class="products-panel glass">
                    <div class="panel-header">
                        <h2>Produtos</h2>
                        <span class="live-badge">ONLINE</span>
                    </div>

                    <div class="product-search">
                        <label for="productSearch">Buscar produto</label>
                        <input type="search" id="productSearch" placeholder="Digite o nome do produto" autocomplete="off">
                    </div>

                    <div class="products-list" id="productsList"></div>
                </div>

                <div class="cart-panel glass">
                    <div class="panel-header">
                        <h2>Carrinho</h2>
                        <button class="clear-btn" id="clearCart" type="button">Limpar</button>
                    </div>

                    <div class="cart-items" id="cartItems"></div>

                    <div class="cart-footer">
                        <div class="total-row">
                            <span>Subtotal</span>
                            <strong id="subtotal">R$ 0,00</strong>
                        </div>

                        <div class="total-row final">
                            <span>Total</span>
                            <strong id="total">R$ 0,00</strong>
                        </div>

                        <div class="payment-section">
                            <h3>Forma de Pagamento</h3>

                            <div class="payment-grid">
                                <button class="payment-btn" type="button">
                                    <span class="ui-icon icon-card" aria-hidden="true"></span>
                                    Cartao
                                </button>

                                <button class="payment-btn" type="button">
                                    <span class="ui-icon icon-pix" aria-hidden="true"></span>
                                    PIX
                                </button>

                                <button class="payment-btn" type="button">
                                    <span class="ui-icon icon-money" aria-hidden="true"></span>
                                    Dinheiro
                                </button>
                            </div>
                        </div>

                        <button class="checkout-btn" id="checkoutBtn" type="button">
                            Finalizar Compra
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div class="scanner-modal" id="scannerModal">
        <div class="scanner-box">
            <div class="scanner-header">
                <h2>Scanner</h2>
                <button id="closeScanner" type="button" aria-label="Fechar scanner">
                    <span class="ui-icon icon-close" aria-hidden="true"></span>
                </button>
            </div>

            <div class="scanner-actions">
                <span id="cameraStatus">Camera frontal</span>
                <button id="switchCamera" type="button">Switch Camera</button>
            </div>

            <div id="reader"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
