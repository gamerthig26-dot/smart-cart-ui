<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Smart Cart</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- ICONS -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <!-- SCANNER -->
    <script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

    <!-- BACKGROUND -->
    <div class="bg-gradient"></div>

    <!-- LOGIN -->
    <div class="login-screen" id="loginScreen">

        <div class="login-box">

            <div class="logo">

                <div class="logo-icon">
                    <i class="fa-solid fa-cart-shopping"></i>
                </div>

                <div>

                    <h1>Smart Cart</h1>
                    <span>Mercado Inteligente</span>

                </div>

            </div>

            <h2>
                Entrar no Carrinho
            </h2>

            <input
                type="text"
                id="userName"
                placeholder="Digite seu nome"
            >

            <input
                type="text"
                id="userCPF"
                placeholder="CPF / Matrícula"
            >

            <button id="loginBtn">
                Entrar
            </button>

        </div>

    </div>

    <!-- APP -->
    <main
        class="app hidden"
        id="app"
    >

        <!-- HEADER -->
        <header>

            <div>

                <h1>
                    Carrinho Inteligente
                </h1>

                <p id="welcomeText">
                    Bem-vindo
                </p>

            </div>

            <button
                class="scan-btn"
                id="scanButton"
            >

                <i class="fa-solid fa-barcode"></i>

                Escanear Produto

            </button>

        </header>

        <!-- CONTEÚDO -->
        <section class="content-grid">

            <!-- PRODUTOS -->
            <div class="products-panel glass">

                <div class="panel-header">

                    <h2>
                        Produtos
                    </h2>

                    <span class="live-badge">
                        ONLINE
                    </span>

                </div>

                <div
                    class="products-list"
                    id="productsList"
                >

                </div>

            </div>

            <!-- CARRINHO -->
            <div class="cart-panel glass">

                <div class="panel-header">

                    <h2>
                        Carrinho
                    </h2>

                    <button
                        class="clear-btn"
                        id="clearCart"
                    >
                        Limpar
                    </button>

                </div>

                <div
                    class="cart-items"
                    id="cartItems"
                >

                </div>

                <!-- FOOTER -->
                <div class="cart-footer">

                    <div class="total-row">

                        <span>Subtotal</span>

                        <strong id="subtotal">
                            R$ 0,00
                        </strong>

                    </div>

                    <div class="total-row final">

                        <span>Total</span>

                        <strong id="total">
                            R$ 0,00
                        </strong>

                    </div>

                    <!-- PAGAMENTO -->
                    <div class="payment-section">

                        <h3>
                            Forma de Pagamento
                        </h3>

                        <div class="payment-grid">

                            <button class="payment-btn">
                                <i class="fa-solid fa-credit-card"></i>
                                Cartão
                            </button>

                            <button class="payment-btn">
                                <i class="fa-brands fa-pix"></i>
                                PIX
                            </button>

                            <button class="payment-btn">
                                <i class="fa-solid fa-money-bill"></i>
                                Dinheiro
                            </button>

                        </div>

                    </div>

                    <button
                        class="checkout-btn"
                        id="checkoutBtn"
                    >
                        Finalizar Compra
                    </button>

                </div>

            </div>

        </section>

    </main>

    <!-- MODAL SCANNER -->
    <div
        class="scanner-modal"
        id="scannerModal"
    >

        <div class="scanner-box">

            <div class="scanner-header">

                <h2>
                    Scanner
                </h2>

                <button id="closeScanner">
                    X
                </button>

            </div>

            <div id="reader"></div>

        </div>

    </div>

    <!-- JS -->
    <script src="script.js"></script>

</body>

</html>
